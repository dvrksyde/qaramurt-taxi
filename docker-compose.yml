version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: qaramurt_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: qaramurt
      POSTGRES_PASSWORD: qaramurt_pass
      POSTGRES_DB: qaramurt_taxi
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./prisma/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qaramurt -d qaramurt_taxi"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qaramurt_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: qaramurt_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://qaramurt:qaramurt_pass@db:5432/qaramurt_taxi
      REDIS_URL: redis://redis:6379
      NEXTAUTH_SECRET: your-super-secret-key-change-in-production
      NEXTAUTH_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
