services:
  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - ./data:/data
    command: >
      osrm-routed
      --algorithm mld
      --max-matching-size 99
      /data/kazakhstan-latest.osrm
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
